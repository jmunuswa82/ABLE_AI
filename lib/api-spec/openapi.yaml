openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ableton AI Track Completion Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: upload
    description: File upload operations
  - name: jobs
    description: Job status
  - name: artifacts
    description: Export artifacts
  - name: analysis
    description: Analysis and completion data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{id}/upload:
    post:
      operationId: uploadAlsFile
      tags: [upload]
      summary: Upload an .als file to a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload accepted, parse job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/parse:
    post:
      operationId: triggerParse
      tags: [projects]
      summary: Trigger parse of uploaded ALS file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Parse triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /projects/{id}/analyze:
    post:
      operationId: triggerAnalysis
      tags: [projects]
      summary: Trigger analysis of parsed project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analysis triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /projects/{id}/generate:
    post:
      operationId: triggerGeneration
      tags: [projects]
      summary: Trigger completion plan generation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generation triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /projects/{id}/export:
    post:
      operationId: triggerExport
      tags: [projects]
      summary: Trigger export artifact compilation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /projects/{id}/project-graph:
    get:
      operationId: getProjectGraph
      tags: [analysis]
      summary: Get parsed project graph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectGraph"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/completion-plan:
    get:
      operationId: getCompletionPlan
      tags: [analysis]
      summary: Get AI completion plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Completion plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionPlan"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/artifacts:
    get:
      operationId: listProjectArtifacts
      tags: [artifacts]
      summary: List export artifacts for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of artifacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactFile"

  /projects/{id}/artifacts/{artifactId}/download:
    get:
      operationId: downloadArtifact
      tags: [artifacts]
      summary: Download an artifact file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: ["string", "null"]
      required:
        - error

    CreateProjectInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
      required:
        - name

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        completionScore:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        originalFileName:
          type: ["string", "null"]
        styleTags:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt
        - styleTags

    ProjectDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
        completionScore:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        originalFileName:
          type: ["string", "null"]
        styleTags:
          type: array
          items:
            type: string
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/JobStatus"
        warnings:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt
        - styleTags
        - jobs
        - warnings

    UploadResponse:
      type: object
      properties:
        projectId:
          type: string
        jobId:
          type: string
        fileName:
          type: string
        status:
          type: string
      required:
        - projectId
        - jobId
        - fileName
        - status

    JobStatus:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        type:
          type: string
        state:
          type: string
        progress:
          type: ["number", "null"]
        message:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - projectId
        - type
        - state
        - createdAt
        - updatedAt

    AutomationPoint:
      type: object
      properties:
        time:
          type: number
          description: Time in beats (quarter notes)
        value:
          type: number
      required:
        - time
        - value

    AutomationLane:
      type: object
      properties:
        targetPath:
          type: string
        parameterName:
          type: string
          description: Human-readable parameter name resolved from PointeeId lookup
        pointeeId:
          type: ["string", "null"]
          description: Ableton internal PointeeId reference
        deviceClass:
          type: ["string", "null"]
          description: Device class that owns this automation target
        points:
          type: array
          items:
            $ref: "#/components/schemas/AutomationPoint"
        density:
          type: number
        shapeSummary:
          type: string
          description: "static | sparse | gentle_ramp | ramp | complex"
        confidence:
          type: number
      required:
        - targetPath
        - parameterName
        - points
        - density
        - shapeSummary
        - confidence

    MidiNote:
      type: object
      properties:
        pitch:
          type: integer
          description: MIDI pitch 0-127
        time:
          type: number
          description: Time in beats relative to clip start
        duration:
          type: number
          description: Duration in beats
        velocity:
          type: integer
          description: MIDI velocity 0-127
      required:
        - pitch
        - time
        - duration
        - velocity

    ClipNode:
      type: object
      properties:
        id:
          type: string
        trackId:
          type: string
        clipType:
          type: string
          description: "audio | midi"
        start:
          type: number
          description: Arrangement start position in beats (quarter notes)
        end:
          type: number
          description: Arrangement end position in beats (quarter notes)
        loop:
          type: boolean
        sourceRef:
          type: ["string", "null"]
        midiNoteCount:
          type: integer
        midiNotes:
          type: array
          items:
            $ref: "#/components/schemas/MidiNote"
        gainInfo:
          type: number
        contentSummary:
          type: string
        clipColor:
          type: ["integer", "null"]
        name:
          type: ["string", "null"]
      required:
        - id
        - trackId
        - clipType
        - start
        - end
        - loop
        - midiNoteCount
        - midiNotes
        - gainInfo
        - contentSummary

    DeviceNode:
      type: object
      properties:
        id:
          type: string
        deviceClass:
          type: string
          description: Ableton device class (e.g. Compressor2, AutoFilter)
        pluginName:
          type: ["string", "null"]
          description: VST/AU plugin name if applicable
        enabled:
          type: boolean
        inferredPurpose:
          type: string
          description: "dynamics | reverb | delay | eq_filter | sampler_instrument | synth | drum_machine | modulation_distortion | utility | midi_effect | effect"
        hasSidechainInput:
          type: boolean
          description: Whether this device has actual sidechain input wiring detected in XML
        parameters:
          type: object
          additionalProperties: true
      required:
        - id
        - deviceClass
        - enabled
        - inferredPurpose
        - hasSidechainInput

    RoutingTarget:
      type: object
      properties:
        target:
          type: string
        upper:
          type: string
        lower:
          type: string
      required:
        - target
        - upper
        - lower

    TrackRouting:
      type: object
      properties:
        audioInput:
          $ref: "#/components/schemas/RoutingTarget"
        audioOutput:
          $ref: "#/components/schemas/RoutingTarget"
        sends:
          type: array
          items:
            type: object
            properties:
              active:
                type: boolean
              amount:
                type: number
            required:
              - active
              - amount

    TrackNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          description: "audio | midi | group | return | master"
        parentGroupId:
          type: ["string", "null"]
        orderIndex:
          type: integer
        muted:
          type: boolean
        solo:
          type: boolean
        frozen:
          type: boolean
        armed:
          type: boolean
        color:
          type: ["integer", "null"]
        inferredRole:
          type: string
          description: "kick | snare | hihat | bass | lead | synth_stab | drone | texture | fx | vocal | return_fx | percussion | transition | utility | unknown"
        inferredConfidence:
          type: number
        clipCount:
          type: integer
        deviceCount:
          type: integer
        automationPoints:
          type: integer
        clips:
          type: array
          items:
            $ref: "#/components/schemas/ClipNode"
        devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceNode"
        automationLanes:
          type: array
          items:
            $ref: "#/components/schemas/AutomationLane"
        routing:
          $ref: "#/components/schemas/TrackRouting"
        warnings:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - type
        - orderIndex
        - muted
        - solo
        - frozen
        - armed
        - inferredRole
        - inferredConfidence
        - clipCount
        - deviceCount
        - automationPoints
        - clips
        - devices
        - automationLanes
        - warnings

    ArrangementSection:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        startBar:
          type: number
          description: Start position in beats (quarter notes)
        endBar:
          type: number
          description: End position in beats (quarter notes)
        energyScore:
          type: number
        densityScore:
          type: number
        dominantRoles:
          type: array
          items:
            type: string
        missingElements:
          type: array
          items:
            type: string
        transitionQuality:
          type: number
      required:
        - id
        - label
        - startBar
        - endBar
        - energyScore
        - densityScore
        - dominantRoles
        - missingElements
        - transitionQuality

    SidechainLink:
      type: object
      properties:
        sourceTrackId:
          type: string
        targetTrackId:
          type: string
        sourceTrackName:
          type: string
        targetTrackName:
          type: string
        deviceClass:
          type: string
        deviceId:
          type: string
        confidence:
          type: number
        relationType:
          type: string
          description: "DETECTED_COMPRESSOR_SIDECHAIN | INFERRED_KICK_TO_BASS_DUCK | INFERRED_KICK_TO_TEXTURE_DUCK | AI_PROPOSED_KICK_TO_BASS_DUCK | AI_PROPOSED_KICK_TO_TEXTURE_DUCK"
        purpose:
          type: string
        bars:
          type: ["array", "null"]
          items:
            type: number
        automationEvidence:
          type: boolean
        deviceEvidence:
          type: boolean
      required:
        - sourceTrackId
        - targetTrackId
        - sourceTrackName
        - targetTrackName
        - deviceClass
        - deviceId
        - confidence
        - relationType
        - purpose
        - automationEvidence
        - deviceEvidence

    Locator:
      type: object
      properties:
        time:
          type: number
          description: Position in beats
        name:
          type: string
      required:
        - time
        - name

    ProjectGraph:
      type: object
      properties:
        projectId:
          type: string
        tempo:
          type: number
        timeSignatureNumerator:
          type: integer
        timeSignatureDenominator:
          type: integer
        arrangementLength:
          type: number
          description: Total arrangement length in beats (quarter notes)
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/TrackNode"
        returnTracks:
          type: array
          items:
            $ref: "#/components/schemas/TrackNode"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ArrangementSection"
        sidechainLinks:
          type: array
          items:
            $ref: "#/components/schemas/SidechainLink"
        locators:
          type: array
          items:
            $ref: "#/components/schemas/Locator"
        parseQuality:
          type: number
        warnings:
          type: array
          items:
            type: string
        styleTags:
          type: array
          items:
            type: string
        totalClips:
          type: integer
        totalDevices:
          type: integer
        returnTrackCount:
          type: integer
        masterTrackPresent:
          type: boolean
      required:
        - projectId
        - tempo
        - timeSignatureNumerator
        - timeSignatureDenominator
        - arrangementLength
        - tracks
        - returnTracks
        - sections
        - sidechainLinks
        - locators
        - parseQuality
        - warnings
        - styleTags
        - totalClips
        - totalDevices
        - returnTrackCount
        - masterTrackPresent

    MutationPayload:
      type: object
      description: Machine-executable mutation descriptor for a completion action
      properties:
        mutationType:
          type: string
          description: "add_clip | add_automation | add_locator | add_sidechain_proposal | extend_clip"
        targetTrackId:
          type: ["string", "null"]
        targetTrackName:
          type: ["string", "null"]
        startBeat:
          type: ["number", "null"]
          description: Start position in beats
        endBeat:
          type: ["number", "null"]
          description: End position in beats
        newTrackName:
          type: ["string", "null"]
        newTrackType:
          type: ["string", "null"]
        automationParameter:
          type: ["string", "null"]
        automationPoints:
          type: ["array", "null"]
          items:
            type: object
            properties:
              time:
                type: number
              value:
                type: number
        clipType:
          type: ["string", "null"]
        notes:
          type: ["array", "null"]
          items:
            type: object
        locatorName:
          type: ["string", "null"]
        safe:
          type: boolean
          description: Whether this mutation can be auto-applied
        reason:
          type: ["string", "null"]
      required:
        - mutationType
        - safe

    CompletionAction:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
          description: "structure | drums | bass | automation | transitions | ending | texture | sidechain | mixing"
        title:
          type: string
        description:
          type: string
        affectedTracks:
          type: array
          items:
            type: string
        affectedBars:
          type: ["string", "null"]
          description: Human-readable bar range (e.g. "32–48")
        startBeat:
          type: ["number", "null"]
          description: Exact start position in beats derived from section coordinates
        endBeat:
          type: ["number", "null"]
          description: Exact end position in beats derived from section coordinates
        targetTrackIds:
          type: array
          items:
            type: string
          description: Actual track IDs from the parsed project
        createsNewTrack:
          type: boolean
        addsAutomation:
          type: boolean
        addsSidechain:
          type: boolean
        mutationPayloads:
          type: array
          items:
            $ref: "#/components/schemas/MutationPayload"
        sectionLabel:
          type: ["string", "null"]
        confidence:
          type: number
        expectedImpact:
          type: string
        rationale:
          type: string
        priority:
          type: string
          description: "critical | high | medium | low"
      required:
        - id
        - category
        - title
        - description
        - affectedTracks
        - confidence
        - expectedImpact
        - rationale
        - priority
        - targetTrackIds
        - createsNewTrack
        - addsAutomation
        - addsSidechain
        - mutationPayloads

    CompletionPlan:
      type: object
      properties:
        projectId:
          type: string
        summary:
          type: string
        confidence:
          type: number
        styleTags:
          type: array
          items:
            type: string
        completionScore:
          type: number
        actions:
          type: array
          items:
            $ref: "#/components/schemas/CompletionAction"
        weaknesses:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        rationale:
          type: string
        generatedAt:
          type: string
          format: date-time
        mutationPlanVersion:
          type: string
      required:
        - projectId
        - summary
        - confidence
        - styleTags
        - completionScore
        - actions
        - weaknesses
        - warnings
        - rationale
        - generatedAt

    ArtifactFile:
      type: object
      properties:
        id:
          type: string
        projectId:
          type: string
        type:
          type: string
          description: "original_als | patched_als | project_graph | completion_plan | instructions | patch_package"
        fileName:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        createdAt:
          type: string
          format: date-time
        description:
          type: ["string", "null"]
      required:
        - id
        - projectId
        - type
        - fileName
        - fileSize
        - mimeType
        - createdAt
